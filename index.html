<!DOCTYPE html>
<html>
<head>
  <title>robe</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      width: 100%;
      font-size: 100px;
      margin-top: 40px;
      font-family: Courier, Courier, sans-serif;
    }

    h2 {
      width: 30%;
      font-size: 40px;
      margin: -20px auto 40px auto;
      font-family: Lexend, serif;
    }

    .game-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .game-card {
      width: 30%;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      text-align: left;
      background-color: #f9f9f9;
    }

    .game-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .game-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .game-desc {
      font-size: 16px;
      color: #555;
    }

  </style>

</head>

<body>

  <h1>Base Place</h1>
  <h2>Cool Stuff</h2>

  <div class="game-row">
    <div class="Card">
      <img src="https://i.imgur.com/example.png" alt="Cool">
      <div class="title">forest</div>
      <div class="desc">not done.</div>
    </div>

    <div class="Card">
      <img src="https://i.imgur.com/example.png" alt="Cool">
      <div class="title">drive</div>
      <div class="desc">not done.</div>
    </div>

    <div class="Card">
      <img src="https://i.imgur.com/example.png" alt="Cool">
      <div class="title">cool</div>
      <div class="desc">not done.</div>
    </div>
  </div>

</body>
</html>
